<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="./node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <!-- Estilos css -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- Tipografia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- barra de navegacion -->
    <nav class="navbar position-fixed fixed-top navbar-expand-lg bg-body-tertiary navbar-custom pt-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">nebularspell</a>
            <!-- boton de busqueda -->
            <div class="w-50">
                <form class="d-flex" role="search">
                    <input class="form-control bor" type="search" placeholder="¿Qué estas buscando?"
                        aria-label="Search" />
                    <button class="btn ms-2 btn-outline-success" type="submit"><i class="bi bi-search"></i></button>
                </form>
            </div>
            <!-- boton de hamburguesa -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- dentro del boton de hamburguesa -->
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item d-lg-none d-flex justify-content-center flex-column flex-wrap">
                        <a class="social-icons p-1" href="#"><i class="bi bi-facebook fs-4"></i></a>
                        <a class="social-icons p-1" href="#"><i class="bi bi-instagram fs-4"></i></a>
                        <a class="social-icons p-1" href="#"><i class="bi bi-whatsapp fs-4"></i></a>
                        <a class="social-icons p-1" href="#"><i class="bi bi-cart4 fs-3"></i></a>
                    </li>
                </ul>
            </div>

            <div class="d-none d-lg-block  contenedor">
                <a class="text-decoration-none social-icons p-1 posicion-icons" href="#">Mis pedidos<i class=" p-2 bi-box-seam-fill fs-4"></i></a>
                <a class="text-decoration-none social-icons p-1 posicion-icons" href="#">Mi cuenta<i class="p-2 bi bi-person fs-4"></i></a>
                <a class="text-decoration-none social-icons p-1 position-icons" href="#"><i class="p-2 bi bi-cart4 fs-4"></i></a>
            </div>

        </div>
        </div>
    </nav>

    <!-- Carrusel de imagenes -->
    <section>
        <div id="carouselExampleDark" class="carousel carousel-dark slide" data-bs-ride="carousel">
            <!-- indicadores -->
            <div class="carousel-inner pb-5">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active"
                        aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1"
                        aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2"
                        aria-label="Slide 3"></button>
                </div>
                <!-- imagenes de productos -->
                <div class="carousel-item active" data-bs-interval="10000">
                    <img src="./assets/banner1.webp" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item" data-bs-interval="2000">
                    <img src="./assets/banner2.webp" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="./assets/banner3.webp" class="d-block w-100" alt="...">
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>


    </section>

    <!-- barra de categorias -->
    <section>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="./assets/banner1.webp" alt="Logo" width="30" height="24"
                        class="d-inline-block align-text-top">
                    Bootstrap
                </a>
            </div>
        </nav>
    </section>

    <!-- Lista de productos -->
    <section class="container my-5">
        <h2 class="text-center mb-4">Nuevos Ingresos</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">

            <div class="col">
                <div class="card h-100">
                    <img src="/assets/20472243.webp" class="card-img-top" alt="Producto A">
                    <div class="card-body">
                        <h5 class="card-title">Producto A</h5>
                        <p class="card-text">$19.99</p>
                        <a href="#" class="btn btn-primary">Agregar al carrito</a>
                    </div>
                </div>
            </div>

            <div class="card h-100">
                <img src="/assets/20472243.webp" class="card-img-top" alt="Producto A">
                <div class="card-body">
                    <h5 class="card-title">Producto A</h5>
                    <p class="card-text">$19.99</p>
                    <a href="#" class="btn btn-primary">Agregar al carrito</a>

                </div>
            </div>

            <div class="card h-100">
                <img src="/assets/20472243.webp" class="card-img-top" alt="Producto A">

            </div>
        </div>
















        <!-- Bootstrap JavaScript -->
        <script src=" ./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
